<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog App — Full Design Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #d97706;
    --amber-light: #f59e0b;
    --amber-pale: #fef3c7;
    --amber-pale-text: #92400e;
    --font-sans: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', monospace;
  }

  body {
    font-family: var(--font-sans);
    background: #0a0c10;
    color: #f1f5f9;
    min-height: 100vh;
    padding: 32px 24px;
  }

  /* ── Meta controls ── */
  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding: 0 4px;
  }
  .meta h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #f1f5f9; }
  .meta p  { font-size: 13px; color: #64748b; margin-top: 2px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .theme-toggle {
    display: flex; gap: 4px; background: #161b27; border: 1px solid #1e2537;
    border-radius: 8px; padding: 4px;
  }
  .theme-toggle button {
    background: none; border: none; cursor: pointer; font-family: var(--font-sans);
    font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 5px;
    color: #64748b; transition: all 0.15s;
  }
  .theme-toggle button.active { background: #1e2537; color: #f1f5f9; }
  .device-toggle {
    display: flex; gap: 4px; background: #161b27; border: 1px solid #1e2537;
    border-radius: 8px; padding: 4px;
  }
  .device-toggle button {
    background: none; border: none; cursor: pointer; font-family: var(--font-sans);
    font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 5px;
    color: #64748b; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  }
  .device-toggle button.active { background: #1e2537; color: #f1f5f9; }

  /* ── Page tabs ── */
  .page-tabs {
    display: flex; gap: 4px; margin-bottom: 24px; background: #161b27;
    border: 1px solid #1e2537; border-radius: 10px; padding: 5px; width: fit-content;
  }
  .page-tabs button {
    background: none; border: none; cursor: pointer; font-family: var(--font-sans);
    font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 7px;
    color: #64748b; transition: all 0.15s; white-space: nowrap;
  }
  .page-tabs button.active { background: #d97706; color: #fff; }

  /* ── Frame ── */
  .frame-outer { transition: max-width 0.3s cubic-bezier(0.4,0,0.2,1); }
  .frame-outer.mobile { max-width: 390px; margin: 0 auto; }
  .frame-wrap {
    border-radius: 14px; overflow: hidden; border: 1px solid #1e2537;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .frame-outer.mobile .frame-wrap { border-radius: 32px; border-width: 8px; }
  .frame-bar {
    background: #161b27; padding: 10px 16px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #1e2537;
  }
  .frame-outer.mobile .frame-bar { padding: 12px 16px 10px; justify-content: center; }
  .frame-outer.mobile .frame-bar .dot { display: none; }
  .frame-outer.mobile .frame-bar .url { max-width: 200px; margin: 0; }
  .frame-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
  .frame-bar .url {
    flex: 1; background: #0f1117; border-radius: 5px; padding: 4px 10px;
    font-size: 11px; color: #3d4f6e; font-family: var(--font-mono); margin: 0 8px;
  }
  .frame { width: 100%; min-height: 520px; overflow-x: hidden; }

  /* ── Mobile responsive overrides (applied via .is-mobile wrapper) ── */

  /* Top nav → icon bar on mobile */
  .is-mobile .d-topnav, .is-mobile .l-topnav {
    padding: 0 16px; height: 48px; position: relative;
  }
  .is-mobile .d-nav-links, .is-mobile .l-nav-links { display: none; }
  .is-mobile .d-brand, .is-mobile .l-brand { margin-right: 0; flex: 1; }
  .is-mobile .d-nav-actions, .is-mobile .l-nav-actions { gap: 6px; }
  .is-mobile .d-btn-ghost, .is-mobile .l-btn-ghost { display: none; }
  .is-mobile .d-btn-primary, .is-mobile .l-btn-primary { font-size: 11px; padding: 6px 10px; }

  /* Bottom tab bar on mobile */
  .mobile-tabs {
    display: none; position: sticky; bottom: 0; background: #161b27;
    border-top: 1px solid #1e2537; padding: 8px 0 12px;
    justify-content: space-around; align-items: center;
  }
  .is-mobile .mobile-tabs { display: flex; }
  .mobile-tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 4px 16px; border-radius: 8px;
  }
  .mobile-tab.active .tab-icon { color: #d97706; }
  .mobile-tab.active .tab-label { color: #d97706; }
  .tab-icon { font-size: 18px; line-height: 1; color: #3d4f6e; }
  .tab-label { font-size: 9px; font-weight: 600; color: #3d4f6e; letter-spacing: 0.3px; }

  .mobile-tabs-light {
    display: none; position: sticky; bottom: 0; background: #fff;
    border-top: 1px solid #e8e8e5; padding: 8px 0 12px;
    justify-content: space-around; align-items: center;
  }
  .is-mobile .mobile-tabs-light { display: flex; }

  /* Stats: 2-col on mobile */
  .is-mobile .d-stats, .is-mobile .l-stats {
    grid-template-columns: 1fr 1fr;
  }
  .is-mobile .d-stats .d-stat:last-child,
  .is-mobile .l-stats .l-stat:last-child {
    grid-column: 1 / -1;
  }

  /* Products grid: 2-col on mobile */
  .is-mobile .d-product-grid, .is-mobile .l-product-grid {
    grid-template-columns: 1fr 1fr;
  }

  /* Catalog grid: 1-col on mobile */
  .is-mobile .d-catalog-grid, .is-mobile .l-catalog-grid {
    grid-template-columns: 1fr;
  }

  /* Editor: single column on mobile */
  .is-mobile .editor-layout {
    grid-template-columns: 1fr !important;
  }

  /* Container padding on mobile */
  .is-mobile .d-container, .is-mobile .l-container { padding: 20px 16px; }

  /* Page header stack on mobile */
  .is-mobile .d-page-header, .is-mobile .l-page-header {
    flex-direction: column; gap: 12px; align-items: flex-start;
  }

  /* Auth pages on mobile */
  .is-mobile .d-auth-page, .is-mobile .l-auth-page { align-items: flex-start; padding-top: 24px; }
  .is-mobile .d-auth-card, .is-mobile .l-auth-card {
    width: 100%; border-radius: 0; border-left: none; border-right: none;
    padding: 28px 20px; box-shadow: none;
  }

  /* Catalog search on mobile */
  .is-mobile .d-catalog-search, .is-mobile .l-catalog-search {
    flex-direction: column; max-width: 100%;
  }
  .is-mobile .d-catalog-hero, .is-mobile .l-catalog-hero { padding: 28px 16px 20px; }
  .is-mobile .d-catalog-title, .is-mobile .l-catalog-title { font-size: 22px; }

  /* ══════════════════════════════════════════════
     LIGHT THEME
  ══════════════════════════════════════════════ */
  .light { display: none; }
  .dark  { display: block; }
  body.show-light .light { display: block; }
  body.show-light .dark  { display: none; }

  /* ══════════════════════════════════════════════
     DARK THEME COMPONENTS
  ══════════════════════════════════════════════ */

  /* Top Nav */
  .d-topnav {
    background: #0f1117; border-bottom: 1px solid #1e2537;
    display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 0;
  }
  .d-brand { display: flex; align-items: center; gap: 8px; margin-right: 32px; }
  .d-brand-icon {
    width: 26px; height: 26px; background: #d97706; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .d-brand-icon svg { width: 14px; height: 14px; fill: white; }
  .d-brand-name { font-size: 14px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.4px; }
  .d-nav-links { display: flex; gap: 2px; flex: 1; }
  .d-nav-link {
    font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 6px;
    color: #64748b; cursor: pointer; transition: all 0.15s;
  }
  .d-nav-link.active { background: #161b27; color: #f1f5f9; border: 1px solid #1e2537; }
  .d-nav-actions { display: flex; align-items: center; gap: 8px; }
  .d-btn-ghost {
    font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px;
    border: 1px solid #1e2537; background: none; color: #94a3b8; cursor: pointer; font-family: var(--font-sans);
  }
  .d-btn-primary {
    font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 6px;
    background: #d97706; color: white; border: none; cursor: pointer; font-family: var(--font-sans);
    letter-spacing: 0.1px;
  }
  .d-avatar {
    width: 30px; height: 30px; border-radius: 50%; background: #1e2537;
    border: 1.5px solid #2d3748; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #94a3b8; cursor: pointer;
  }

  /* Page body */
  .d-page { background: #0f1117; min-height: 468px; }
  .d-container { max-width: 960px; margin: 0 auto; padding: 28px 24px; }

  /* Page header */
  .d-page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
  .d-page-title { font-size: 20px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
  .d-page-sub { font-size: 13px; color: #64748b; margin-top: 2px; }

  /* Stat cards */
  .d-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .d-stat {
    background: #161b27; border: 1px solid #1e2537; border-radius: 10px; padding: 16px 18px;
  }
  .d-stat.accent { background: #d97706; border-color: #d97706; }
  .d-stat-label { font-size: 11px; font-weight: 600; color: #3d4f6e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .d-stat.accent .d-stat-label { color: rgba(255,255,255,0.65); }
  .d-stat-value { font-size: 26px; font-weight: 800; color: #f1f5f9; letter-spacing: -1px; }
  .d-stat.accent .d-stat-value { color: #fff; }
  .d-stat-meta { font-size: 11px; color: #3d4f6e; margin-top: 3px; }
  .d-stat.accent .d-stat-meta { color: rgba(255,255,255,0.5); }

  /* Cards */
  .d-card {
    background: #161b27; border: 1px solid #1e2537; border-radius: 10px; overflow: hidden;
  }
  .d-card-header {
    padding: 14px 18px; border-bottom: 1px solid #1e2537;
    display: flex; align-items: center; justify-content: space-between;
  }
  .d-card-title { font-size: 13px; font-weight: 700; color: #f1f5f9; }
  .d-card-body { padding: 0; }

  /* Product table rows */
  .d-table-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 18px;
    border-bottom: 1px solid #1e2537; transition: background 0.1s;
  }
  .d-table-row:last-child { border-bottom: none; }
  .d-thumb { width: 36px; height: 36px; background: #1e2537; border-radius: 6px; flex-shrink: 0; }
  .d-thumb.amber { background: rgba(217,119,6,0.2); }
  .d-row-name { font-size: 13px; font-weight: 600; color: #e2e8f0; flex: 1; }
  .d-row-price { font-size: 13px; font-weight: 700; color: #f59e0b; font-family: var(--font-mono); }
  .d-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .d-badge.live { background: #fef3c7; color: #92400e; }
  .d-badge.draft { background: #1e2537; color: #64748b; border: 1px solid #2d3748; }
  .d-badge.new { background: rgba(217,119,6,0.15); color: #f59e0b; border: 1px solid rgba(217,119,6,0.3); }

  /* Grid of product cards */
  .d-product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .d-product-card {
    background: #161b27; border: 1px solid #1e2537; border-radius: 10px; overflow: hidden; cursor: pointer;
  }
  .d-product-card.featured { border-color: rgba(217,119,6,0.4); }
  .d-product-img { height: 100px; background: #1e2537; position: relative; }
  .d-product-img.c1 { background: linear-gradient(135deg,#1e2537,#2d3748); }
  .d-product-img.c2 { background: linear-gradient(135deg,#1e2030,#2d2040); }
  .d-product-img.c3 { background: linear-gradient(135deg,#1e2818,#2d3828); }
  .d-product-img.c4 { background: linear-gradient(135deg,#2d1e18,#3d2d18); }
  .d-product-info { padding: 10px 12px; }
  .d-product-name { font-size: 12px; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .d-product-price { font-size: 12px; font-weight: 700; color: #f59e0b; font-family: var(--font-mono); }
  .d-product-actions { display: flex; gap: 4px; padding: 8px 12px; border-top: 1px solid #1e2537; }
  .d-btn-xs {
    font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px;
    border: 1px solid #1e2537; background: none; color: #64748b; cursor: pointer; font-family: var(--font-sans);
  }
  .d-btn-xs.primary { background: #d97706; border-color: #d97706; color: white; }

  /* Form */
  .d-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .d-form-full { grid-column: 1 / -1; }
  .d-field { display: flex; flex-direction: column; gap: 6px; }
  .d-label { font-size: 12px; font-weight: 600; color: #94a3b8; letter-spacing: 0.2px; }
  .d-input {
    width: 100%; background: #161b27; border: 1px solid #1e2537; border-radius: 7px;
    padding: 9px 12px; font-size: 13px; color: #f1f5f9; font-family: var(--font-sans); outline: none;
    min-width: 0;
  }
  .d-input:focus { border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
  .d-input::placeholder { color: #2d3748; }
  .d-textarea {
    width: 100%; background: #161b27; border: 1px solid #1e2537; border-radius: 7px;
    padding: 9px 12px; font-size: 13px; color: #f1f5f9; font-family: var(--font-sans);
    resize: vertical; min-height: 80px; outline: none;
  }
  .d-img-upload {
    border: 1.5px dashed #2d3748; border-radius: 8px; padding: 24px;
    display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
  }
  .d-img-upload:hover { border-color: #d97706; background: rgba(217,119,6,0.03); }
  .d-upload-icon { font-size: 24px; }
  .d-upload-text { font-size: 12px; color: #64748b; text-align: center; }
  .d-upload-text span { color: #d97706; font-weight: 600; }
  .d-select {
    width: 100%; background: #161b27; border: 1px solid #1e2537; border-radius: 7px;
    padding: 9px 12px; font-size: 13px; color: #f1f5f9; font-family: var(--font-sans); outline: none;
    -webkit-appearance: none; cursor: pointer; min-width: 0;
  }
  .d-form-footer {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
    padding-top: 16px; border-top: 1px solid #1e2537;
  }

  /* Auth page */
  .d-auth-page {
    background: #0f1117; min-height: 520px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .d-auth-bg {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(217,119,6,0.06) 0%, transparent 70%);
  }
  .d-auth-card {
    background: #161b27; border: 1px solid #1e2537; border-radius: 14px;
    padding: 36px 40px; width: 420px; max-width: calc(100vw - 48px); position: relative; z-index: 1;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .d-auth-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
  .d-auth-logo-icon {
    width: 32px; height: 32px; background: #d97706; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .d-auth-logo-name { font-size: 16px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
  .d-auth-title { font-size: 20px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; margin-bottom: 4px; }
  .d-auth-sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }
  .d-auth-field { margin-bottom: 14px; }
  .d-auth-divider {
    display: flex; align-items: center; gap: 12px; margin: 18px 0;
  }
  .d-auth-divider::before, .d-auth-divider::after {
    content: ''; flex: 1; height: 1px; background: #1e2537;
  }
  .d-auth-divider span { font-size: 11px; color: #3d4f6e; }
  .d-auth-footer { text-align: center; margin-top: 18px; font-size: 12px; color: #64748b; }
  .d-auth-footer a { color: #d97706; font-weight: 600; text-decoration: none; }
  .d-btn-full {
    width: 100%; padding: 10px; background: #d97706; color: white; border: none;
    border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font-sans);
    letter-spacing: 0.1px;
  }
  .d-notice {
    background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.2);
    border-radius: 7px; padding: 10px 14px; font-size: 12px; color: #d97706;
    margin-bottom: 20px; display: flex; align-items: center; gap: 7px;
  }

  /* Catalog page */
  .d-catalog-hero {
    background: #161b27; border-bottom: 1px solid #1e2537; padding: 40px 24px 32px;
    text-align: center;
  }
  .d-catalog-badge {
    display: inline-block; background: rgba(217,119,6,0.15); border: 1px solid rgba(217,119,6,0.3);
    color: #f59e0b; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
    margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .d-catalog-title { font-size: 28px; font-weight: 900; color: #f1f5f9; letter-spacing: -1px; margin-bottom: 8px; }
  .d-catalog-sub { font-size: 14px; color: #64748b; margin-bottom: 20px; }
  .d-catalog-search {
    display: flex; gap: 8px; max-width: 440px; margin: 0 auto;
  }
  .d-catalog-search input {
    flex: 1; background: #0f1117; border: 1px solid #1e2537; border-radius: 8px;
    padding: 9px 14px; font-size: 13px; color: #f1f5f9; font-family: var(--font-sans); outline: none;
  }
  .d-catalog-search input:focus { border-color: #d97706; }
  .d-catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .d-catalog-card {
    background: #161b27; border: 1px solid #1e2537; border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s;
  }
  .d-catalog-card:hover { border-color: rgba(217,119,6,0.3); }
  .d-catalog-img { height: 130px; }
  .d-catalog-img.ca { background: linear-gradient(135deg,#1e2537,#2d3748); }
  .d-catalog-img.cb { background: linear-gradient(135deg,#1e2030,#2d2840); }
  .d-catalog-img.cc { background: linear-gradient(135deg,#1e2818,#2d3828); }
  .d-catalog-info { padding: 14px; }
  .d-catalog-name { font-size: 14px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .d-catalog-desc { font-size: 12px; color: #64748b; margin-bottom: 10px; line-height: 1.5; }
  .d-catalog-footer { display: flex; align-items: center; justify-content: space-between; }
  .d-catalog-price { font-size: 16px; font-weight: 800; color: #f59e0b; font-family: var(--font-mono); }
  .d-catalog-cta {
    font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 5px;
    background: rgba(217,119,6,0.15); color: #f59e0b; border: 1px solid rgba(217,119,6,0.3); cursor: pointer;
  }

  /* Public topnav */
  .d-public-nav {
    background: #0f1117; border-bottom: 1px solid #1e2537;
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px;
  }
  .d-public-nav-left { display: flex; align-items: center; gap: 8px; }
  .d-public-nav-right { display: flex; align-items: center; gap: 8px; }

  /* ══════════════════════════════════════════════
     LIGHT THEME COMPONENTS
  ══════════════════════════════════════════════ */

  /* Top Nav */
  .l-topnav {
    background: #fff; border-bottom: 1px solid #e8e8e5;
    display: flex; align-items: center; padding: 0 24px; height: 52px; gap: 0;
  }
  .l-brand { display: flex; align-items: center; gap: 8px; margin-right: 32px; }
  .l-brand-icon {
    width: 26px; height: 26px; background: #d97706; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .l-brand-name { font-size: 14px; font-weight: 800; color: #111; letter-spacing: -0.4px; }
  .l-nav-links { display: flex; gap: 2px; flex: 1; }
  .l-nav-link {

let currentTheme = 'dark';
let currentPage = 'login';
let currentDevice = 'desktop';

const MOBILE_TABS_DARK = `
  <div class="mobile-tabs">
    <div class="mobile-tab" onclick="setPage('dashboard')" id="mtab-dashboard">
      <div class="tab-icon">⊞</div><div class="tab-label">Dashboard</div>
    </div>
    <div class="mobile-tab" onclick="setPage('products')" id="mtab-products">
      <div class="tab-icon">◫</div><div class="tab-label">Products</div>
    </div>
    <div class="mobile-tab" onclick="setPage('catalog')" id="mtab-catalog">
      <div class="tab-icon">↗</div><div class="tab-label">Catalog</div>
    </div>
    <div class="mobile-tab" onclick="setPage('editor')" id="mtab-editor">
      <div class="tab-icon">＋</div><div class="tab-label">Add</div>
    </div>
  </div>`;

const MOBILE_TABS_LIGHT = `
  <div class="mobile-tabs-light">
    <div class="mobile-tab" onclick="setPage('dashboard')" id="mtab-dashboard">
      <div class="tab-icon" style="color:#bbb;">⊞</div><div class="tab-label" style="color:#bbb;">Dashboard</div>
    </div>
    <div class="mobile-tab" onclick="setPage('products')" id="mtab-products">
      <div class="tab-icon" style="color:#bbb;">◫</div><div class="tab-label" style="color:#bbb;">Products</div>
    </div>
    <div class="mobile-tab" onclick="setPage('catalog')" id="mtab-catalog">
      <div class="tab-icon" style="color:#bbb;">↗</div><div class="tab-label" style="color:#bbb;">Catalog</div>
    </div>
    <div class="mobile-tab" onclick="setPage('editor')" id="mtab-editor">
      <div class="tab-icon" style="color:#bbb;">＋</div><div class="tab-label" style="color:#bbb;">Add</div>
    </div>
  </div>`;

function setDevice(device) {
  currentDevice = device;
  const outer = document.getElementById('frame-outer');
  outer.classList.toggle('mobile', device === 'mobile');
  document.querySelectorAll('.device-toggle button').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && device==='desktop') || (i===1 && device==='mobile'));
  });
  renderPage();
}

function setTheme(theme) {
  currentTheme = theme;
  document.querySelectorAll('.theme-toggle button').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && theme==='dark') || (i===1 && theme==='light'));
  });
  if (theme === 'light') document.body.classList.add('show-light');
  else document.body.classList.remove('show-light');
  renderPage();
}

function setPage(page) {
  currentPage = page;
  document.querySelectorAll('.page-tabs button').forEach((b,i) => {
    const pages = ['login','signup','dashboard','products','editor','catalog'];
    b.classList.toggle('active', pages[i] === page);
  });
  renderPage();
}

function renderPage() {
  const p = PAGES[currentPage];
  document.getElementById('url-bar').textContent = p.url;

  const isMobile = currentDevice === 'mobile';
  const authPages = ['login','signup'];
  const showTabs = isMobile && !authPages.includes(currentPage);
  const tabs = showTabs ? (currentTheme === 'dark' ? MOBILE_TABS_DARK : MOBILE_TABS_LIGHT) : '';

  // Inject content, wrap in is-mobile if needed
  let content = p[currentTheme];
  // For pages with a page div wrapper, append tabs inside
  if (showTabs) {
    // Insert mobile tabs before closing the last div
    content = content.replace(/(<\/div>\s*)$/, tabs + '$1');
  }

  if (isMobile) {
    document.getElementById('frame-content').innerHTML = `<div class="is-mobile">${content}</div>`;
  } else {
    document.getElementById('frame-content').innerHTML = content;
  }

  // Highlight active tab
  if (showTabs) {
    const tabMap = {dashboard:'mtab-dashboard', products:'mtab-products', catalog:'mtab-catalog', editor:'mtab-editor'};
    const activeTab = tabMap[currentPage];
    if (activeTab) {
      const el = document.getElementById(activeTab);
      if (el) {
        el.classList.add('active');
        el.querySelectorAll('.tab-icon, .tab-label').forEach(c => c.style.color = '#d97706');
      }
    }
  }
}

renderPage();
</script>
